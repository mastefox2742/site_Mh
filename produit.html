<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Produit —   MH Picture Affiches Bibliques</title>
  <link rel="stylesheet" href="style.css">
  <style>
    /* ── PAGE-SPECIFIC: PRODUIT ── */

    .breadcrumb {
      padding: 18px 0;
      font-size: 11px;
      letter-spacing: 1px;
      color: var(--gray);
    }
    .breadcrumb a { color: var(--gray); transition: color var(--transition); }
    .breadcrumb a:hover { color: var(--olive-dark); }
    .breadcrumb span { margin: 0 8px; }

    /* PRODUCT DETAIL GRID */
    .product-detail {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 80px;
      padding-bottom: 100px;
      align-items: start;
    }

    /* IMAGE GALLERY */
    .gallery { position: sticky; top: 90px; }
    .gallery-main {
      aspect-ratio: 3/4;
      overflow: hidden;
      background: var(--cream-dark);
      margin-bottom: 12px;
      cursor: zoom-in;
    }
    .gallery-main-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.5s ease;
    }
    .gallery-main:hover .gallery-main-img { transform: scale(1.06); }
    .gallery-thumbs {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
    }
    .gallery-thumb {
      aspect-ratio: 1;
      overflow: hidden;
      background: var(--cream-dark);
      cursor: pointer;
      border: 2px solid transparent;
      transition: border-color var(--transition);
    }
    .gallery-thumb.active { border-color: var(--olive-dark); }
    .gallery-thumb img { width: 100%; height: 100%; object-fit: cover; }

    /* PRODUCT INFO */
    .product-info { padding-top: 12px; }

    .info-collection { margin-bottom: 6px; }
    .info-collection a { font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: var(--olive-dark); font-weight: 600; }
    .info-title {
      font-family: var(--font-display);
      font-size: clamp(24px, 3vw, 36px);
      font-weight: 500;
      line-height: 1.15;
      margin-bottom: 16px;
    }

    .price-wrap { display: flex; align-items: center; gap: 12px; margin-bottom: 24px; }
    .info-price { font-size: 26px; font-weight: 700; color: var(--anthracite); }
    .info-price-original { font-size: 16px; text-decoration: line-through; color: var(--gray-light); font-weight: 400; }
    .price-badge { background: #8B4513; color: white; font-size: 10px; letter-spacing: 1.5px; padding: 4px 10px; font-weight: 700; }

    .info-divider { height: 1px; background: var(--border); margin: 24px 0; }

    /* OPTIONS */
    .option-label {
      font-size: 10px;
      letter-spacing: 3px;
      text-transform: uppercase;
      font-weight: 700;
      color: var(--anthracite);
      margin-bottom: 12px;
      display: flex;
      justify-content: space-between;
    }
    .option-label a { font-size: 10px; color: var(--olive-dark); text-decoration: underline; }

    /* Color picker */
    .color-options { display: flex; gap: 10px; margin-bottom: 24px; }
    .color-option {
      width: 32px; height: 32px;
      border-radius: 50%;
      cursor: pointer;
      border: 2px solid transparent;
      transition: border-color var(--transition), transform var(--transition);
      position: relative;
    }
    .color-option.active { border-color: var(--anthracite); transform: scale(1.1); }
    .color-option::after {
      content: attr(data-label);
      position: absolute;
      bottom: -22px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 9px;
      color: var(--gray);
      white-space: nowrap;
      opacity: 0;
      transition: opacity var(--transition);
    }
    .color-option:hover::after { opacity: 1; }

    /* Size selector */
    .size-options { display: flex; gap: 8px; margin-bottom: 24px; flex-wrap: wrap; }
    .size-option {
      padding: 10px 20px;
      font-size: 12px;
      letter-spacing: 1.5px;
      font-weight: 600;
      border: 1.5px solid var(--border);
      cursor: pointer;
      transition: all var(--transition);
      background: var(--white);
      color: var(--gray);
      font-family: var(--font-body);
    }
    .size-option:hover { border-color: var(--olive); color: var(--anthracite); }
    .size-option.active { background: var(--anthracite); color: var(--cream); border-color: var(--anthracite); }

    /* Frame option */
    .frame-toggle { display: flex; gap: 0; margin-bottom: 24px; border: 1.5px solid var(--border); overflow: hidden; }
    .frame-btn {
      flex: 1;
      padding: 11px;
      font-size: 11px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      font-weight: 600;
      cursor: pointer;
      background: var(--white);
      color: var(--gray);
      border: none;
      font-family: var(--font-body);
      transition: all var(--transition);
    }
    .frame-btn.active { background: var(--anthracite); color: var(--cream); }
    .frame-btn:not(:last-child) { border-right: 1.5px solid var(--border); }

    /* Qty + CTA */
    .qty-wrap { display: flex; align-items: center; gap: 16px; margin-bottom: 16px; }
    .qty-selector {
      display: flex;
      align-items: center;
      border: 1.5px solid var(--border);
      overflow: hidden;
    }
    .qty-selector button {
      width: 44px;
      height: 50px;
      background: none;
      border: none;
      font-size: 20px;
      cursor: pointer;
      color: var(--anthracite);
      transition: background var(--transition);
      font-family: var(--font-body);
    }
    .qty-selector button:hover { background: var(--cream-dark); }
    .qty-selector input {
      width: 50px;
      height: 50px;
      text-align: center;
      border: none;
      border-left: 1.5px solid var(--border);
      border-right: 1.5px solid var(--border);
      font-size: 15px;
      font-weight: 600;
      background: var(--white);
      font-family: var(--font-body);
      outline: none;
      color: var(--anthracite);
    }
    .btn-add-to-cart {
      flex: 1;
      height: 50px;
      background: var(--anthracite);
      color: var(--cream);
      font-size: 11px;
      letter-spacing: 3px;
      text-transform: uppercase;
      font-weight: 700;
      border: none;
      cursor: pointer;
      transition: background var(--transition);
      font-family: var(--font-body);
    }
    .btn-add-to-cart:hover { background: var(--olive-dark); }
    .btn-wishlist {
      width: 50px;
      height: 50px;
      border: 1.5px solid var(--border);
      background: var(--white);
      font-size: 20px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: border-color var(--transition), background var(--transition);
    }
    .btn-wishlist:hover { border-color: var(--olive); background: var(--cream-dark); }

    /* Info bullets */
    .info-bullets { margin: 24px 0; }
    .info-bullet {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      margin-bottom: 12px;
      font-size: 13px;
      color: var(--gray);
    }
    .info-bullet span:first-child { color: var(--olive-dark); font-size: 16px; flex-shrink: 0; }

    /* TABS */
    .info-tabs { margin-top: 36px; }
    .tab-headers { display: flex; border-bottom: 1px solid var(--border); margin-bottom: 24px; }
    .tab-header {
      padding: 12px 20px;
      font-size: 11px;
      letter-spacing: 2px;
      text-transform: uppercase;
      font-weight: 700;
      cursor: pointer;
      color: var(--gray);
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
      transition: all var(--transition);
      background: none;
      border-top: none;
      border-left: none;
      border-right: none;
      font-family: var(--font-body);
    }
    .tab-header.active { color: var(--anthracite); border-bottom-color: var(--olive); }
    .tab-panel { display: none; font-size: 13px; color: var(--gray); line-height: 1.8; }
    .tab-panel.active { display: block; }

    /* RELATED PRODUCTS */
    .related-section { padding: 80px 0 100px; border-top: 1px solid var(--border); margin-top: 60px; }
    .related-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 24px;
    }

    /* RESPONSIVE */
    @media (max-width: 900px) {
      .product-detail { grid-template-columns: 1fr; gap: 40px; }
      .gallery { position: static; }
      .related-grid { grid-template-columns: repeat(2, 1fr); }
    }
    @media (max-width: 600px) {
      .gallery-thumbs { grid-template-columns: repeat(4, 1fr); }
      .related-grid { grid-template-columns: repeat(2, 1fr); gap: 12px; }
    }
  </style>
</head>
<body>
  <div id="nav-root"></div>

  <div class="container">
    <!-- BREADCRUMB -->
    <nav class="breadcrumb">
      <a href="index.html">Accueil</a>
      <span>›</span>
      <a href="catalogue.html">Boutique</a>
      <span>›</span>
      <span id="breadcrumb-name">Chargement…</span>
    </nav>

    <!-- PRODUCT DETAIL -->
    <div class="product-detail">

      <!-- LEFT: GALLERY -->
      <div class="gallery">
        <div class="gallery-main">
          <!-- REPLACE: src="PLACEHOLDER_IMAGE_URL" → image principale du produit -->
          <img class="gallery-main-img" id="main-img" src="images03.jpg" alt="Affiche"
               onerror="this.parentElement.style.background='#C4C49C'">
        </div>
        <div class="gallery-thumbs" id="gallery-thumbs">
          <!-- REPLACE: Les 4 miniatures ci-dessous par vos images de produit sous différents angles/cadres -->
          <!-- Thumb 1: Vue principale -->
          <div class="gallery-thumb active" onclick="setMainImg(this, 'PLACEHOLDER_IMAGE_URL')">
            <img src="images04.jpg" alt="Vue 1" onerror="this.parentElement.style.background='#C4C49C'">
          </div>
          <!-- Thumb 2: Vue dans un salon -->
          <div class="gallery-thumb" onclick="setMainImg(this, 'PLACEHOLDER_IMAGE_URL')">
            <img src="images05.jpg" alt="Vue salon" onerror="this.parentElement.style.background='#A8A680'">
          </div>
          <!-- Thumb 3: Vue avec cadre -->
          <div class="gallery-thumb" onclick="setMainImg(this, 'PLACEHOLDER_IMAGE_URL')">
            <img src="images06.jpg" alt="Vue cadre" onerror="this.parentElement.style.background='#8A8A65'">
          </div>
          <!-- Thumb 4: Gros plan texture -->
          <div class="gallery-thumb" onclick="setMainImg(this, 'PLACEHOLDER_IMAGE_URL')">
            <img src="images07.jpg" alt="Détail" onerror="this.parentElement.style.background='#C4C49C'">
          </div>
        </div>
      </div>

      <!-- RIGHT: INFO -->
      <div class="product-info" id="product-info">
        <!-- Injected by JS -->
      </div>
    </div>
  </div>

  <!-- RELATED -->
  <div class="container">
    <div class="related-section">
      <div class="section-head" style="text-align:left;margin-bottom:32px">
        <p class="label-caps">Vous aimerez aussi</p>
        <h2 style="font-size:28px">Produits similaires</h2>
      </div>
      <div class="related-grid" id="related-grid"></div>
    </div>
  </div>

  <div id="footer-root"></div>

  <script src="main.js"></script>
  <script>
    document.getElementById('nav-root').innerHTML = buildSharedNav('catalogue');
    document.getElementById('footer-root').innerHTML = buildSharedFooter();
    Cart.updateBadge();

    // Read product ID from URL
    const urlParams = new URLSearchParams(window.location.search);
    const productId = parseInt(urlParams.get('id')) || 1;
    const product = PRODUCTS.find(p => p.id === productId) || PRODUCTS[0];

    // Update breadcrumb
    document.getElementById('breadcrumb-name').textContent = product.name;
    document.title = product.name + ' — Hosarah';

    // State
    let selectedSize = 'A3';
    let selectedColor = product.colors[0];
    let quantity = 1;
    let hasFrame = false;

    function renderProductInfo() {
      const hasDiscount = product.originalPrice !== null;
      const discount = hasDiscount ? Math.round((1 - product.price/product.originalPrice)*100) : 0;

      const colorSwatches = product.colors.map((c, i) =>
        `<div class="color-option ${i===0?'active':''}" style="background:${c}" data-color="${c}" data-label="Variante ${i+1}" onclick="selectColor(this, '${c}')"></div>`
      ).join('');

      const sizeButtons = product.sizes.map(s =>
        `<button class="size-option ${s===selectedSize?'active':''}" onclick="selectSize(this,'${s}')">${s}</button>`
      ).join('');

      document.getElementById('product-info').innerHTML = `
        <div class="info-collection">
          <a href="catalogue.html?cat=${encodeURIComponent(product.collection)}">${product.collection}</a>
        </div>
        <h1 class="info-title">${product.name}</h1>
        <div class="price-wrap">
          ${hasDiscount ? `<span class="info-price-original">${product.originalPrice.toFixed(2).replace('.',',')} €</span>` : ''}
          <span class="info-price">${product.price.toFixed(2).replace('.',',')} €</span>
          ${hasDiscount ? `<span class="price-badge">−${discount}%</span>` : ''}
        </div>
        <p style="font-size:13px;color:var(--gray);line-height:1.7;margin-bottom:24px">${product.description}</p>

        <div class="info-divider"></div>

        <!-- COLOR -->
        <div>
          <p class="option-label">Couleur / Variante</p>
          <div class="color-options">${colorSwatches}</div>
        </div>

        <!-- SIZE -->
        <div style="margin-top:20px">
          <p class="option-label">
            Format
            <a href="#tab-size">Guide des tailles</a>
          </p>
          <div class="size-options">${sizeButtons}</div>
        </div>

        <!-- FRAME -->
        <div>
          <p class="option-label">Finition</p>
          <div class="frame-toggle">
            <button class="frame-btn active" onclick="selectFrame(this, false)">Sans cadre</button>
            <button class="frame-btn" onclick="selectFrame(this, true)">Avec cadre (+10€)</button>
          </div>
        </div>

        <!-- QTY + ADD -->
        <div class="qty-wrap">
          <div class="qty-selector">
            <button onclick="changeQty(-1)">−</button>
            <input type="number" id="qty-input" value="1" min="1" max="10" onchange="quantity=parseInt(this.value)||1">
            <button onclick="changeQty(1)">+</button>
          </div>
          <button class="btn-add-to-cart" onclick="addCurrentProduct()">Ajouter au panier</button>
          <button class="btn-wishlist" title="Ajouter aux favoris" onclick="showToast('Ajouté aux favoris ♡')">♡</button>
        </div>

        <!-- BULLETS -->
        <div class="info-bullets">
          <div class="info-bullet"><span>✓</span><span>Impression premium sur papier mat 250g/m²</span></div>
          <div class="info-bullet"><span>✓</span><span>Livraison soignée en emballage rigide anti-pli</span></div>
          <div class="info-bullet"><span>✓</span><span>Livraison gratuite dès 50€ d'achat</span></div>
          <div class="info-bullet"><span>✓</span><span>Satisfait ou remboursé sous 30 jours</span></div>
        </div>

        <!-- SHARE -->
        <div style="display:flex;align-items:center;gap:12px;margin-top:8px">
          <span style="font-size:10px;letter-spacing:2px;text-transform:uppercase;font-weight:700;color:var(--gray)">Partager</span>
          <button class="btn-wishlist" onclick="showToast('Lien copié !')" title="Copier le lien" style="width:36px;height:36px;font-size:15px">🔗</button>
          <button class="btn-wishlist" title="Instagram" style="width:36px;height:36px;font-size:15px">📷</button>
          <button class="btn-wishlist" title="Facebook" style="width:36px;height:36px;font-size:15px">📘</button>
        </div>

        <!-- TABS -->
        <div class="info-tabs" id="info-tabs">
          <div class="tab-headers">
            <button class="tab-header active" onclick="switchTab(this,'tab-desc')">Description</button>
            <button class="tab-header" id="tab-size" onclick="switchTab(this,'tab-size-guide')">Tailles</button>
            <button class="tab-header" onclick="switchTab(this,'tab-shipping')">Livraison</button>
          </div>
          <div class="tab-panel active" id="tab-desc">
            <p>${product.description}</p>
            <br>
            <p>Chaque affiche est imprimée à la demande sur notre papier mat épais 250g/m², avec des encres pigmentées qui résistent au temps et à la lumière. Les couleurs sont fidèles et les textes nets à toutes les tailles.</p>
          </div>
          <div class="tab-panel" id="tab-size-guide">
            <table style="width:100%;border-collapse:collapse;font-size:12px">
              <tr style="border-bottom:1px solid var(--border)">
                <th style="text-align:left;padding:8px 0;font-weight:700">Format</th>
                <th style="text-align:left;padding:8px;font-weight:700">Dimensions (cm)</th>
                <th style="text-align:left;padding:8px;font-weight:700">Usage recommandé</th>
              </tr>
              <tr style="border-bottom:1px solid var(--border)"><td style="padding:8px 0">A4</td><td style="padding:8px">21 × 29.7</td><td style="padding:8px">Bureau, bureau de nuit</td></tr>
              <tr style="border-bottom:1px solid var(--border)"><td style="padding:8px 0">A3</td><td style="padding:8px">29.7 × 42</td><td style="padding:8px">Salon, chambre</td></tr>
              <tr style="border-bottom:1px solid var(--border)"><td style="padding:8px 0">A2</td><td style="padding:8px">42 × 59.4</td><td style="padding:8px">Pièce principale</td></tr>
              <tr><td style="padding:8px 0">A1</td><td style="padding:8px">59.4 × 84.1</td><td style="padding:8px">Grand format, galerie</td></tr>
            </table>
          </div>
          <div class="tab-panel" id="tab-shipping">
            <p><strong>Livraison standard :</strong> 3–5 jours ouvrés · 4,90€ (gratuite dès 50€)</p>
            <br>
            <p><strong>Livraison express :</strong> 24–48h · 9,90€</p>
            <br>
            <p><strong>Retours :</strong> Sous 30 jours, article non utilisé dans son emballage d'origine. Remboursement intégral garanti.</p>
          </div>
        </div>
      `;
    }

    function selectColor(el, color) {
      document.querySelectorAll('.color-option').forEach(c => c.classList.remove('active'));
      el.classList.add('active');
      selectedColor = color;
    }
    function selectSize(el, size) {
      document.querySelectorAll('.size-option').forEach(s => s.classList.remove('active'));
      el.classList.add('active');
      selectedSize = size;
    }
    function selectFrame(el, frame) {
      document.querySelectorAll('.frame-btn').forEach(b => b.classList.remove('active'));
      el.classList.add('active');
      hasFrame = frame;
    }
    function changeQty(delta) {
      quantity = Math.max(1, Math.min(10, quantity + delta));
      document.getElementById('qty-input').value = quantity;
    }
    function addCurrentProduct() {
      const variant = selectedSize + (hasFrame ? ' + Cadre' : '');
      Cart.addItem(product.id, quantity, variant);
      toggleCart(true);
    }
    function setMainImg(thumb, src) {
      document.querySelectorAll('.gallery-thumb').forEach(t => t.classList.remove('active'));
      thumb.classList.add('active');
      document.getElementById('main-img').src = src;
    }
    function switchTab(btn, panelId) {
      document.querySelectorAll('.tab-header').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById(panelId).classList.add('active');
    }

    // Render
    renderProductInfo();

    // Related products (exclude current)
    const related = PRODUCTS.filter(p => p.id !== product.id).slice(0, 4);
    document.getElementById('related-grid').innerHTML = related.map(p => renderProductCard(p)).join('');
  </script>
</body>
</html>
